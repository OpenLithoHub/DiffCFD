name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv and install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install maturin torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy matplotlib pyamg "gymnasium>=0.26" meshio pyevtk pytest

      - name: Build and install package
        run: |
          . .venv/bin/activate
          maturin develop --release

      - name: Run unit tests
        run: |
          . .venv/bin/activate
          python -m pytest tests/unit/ -v --tb=short
        timeout-minutes: 15
