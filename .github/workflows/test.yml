name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy matplotlib pyamg "gymnasium>=0.26" meshio pyevtk pytest

      - name: Install package
        run: pip install -e .

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short
        timeout-minutes: 10
